<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sangriaERP</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <div class="container">
      <h1>sangriaERP</h1>
      <p class="subtitle">Enterprise Resource Planning</p>
    </div>
  </header>
  <main>
    <div class="container">
      <div class="dashboard">
        <div class="card">
          <h2>Welcome</h2>
          <p>Your ERP system is up and running. Start building your modules here.</p>
        </div>
        <div class="card">
          <h2>Status</h2>
          <p id="status">Checking...</p>
        </div>
      </div>
    </div>
  </main>
  <script>
    fetch('/api/health')
      .then(r => r.json())
      .then(data => {
        document.getElementById('status').textContent = 'System: ' + data.status.toUpperCase();
      })
      .catch(() => {
        document.getElementById('status').textContent = 'System: OFFLINE';
      });
  </script>
</body>
</html>
