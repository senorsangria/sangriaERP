{% extends "base.html" %}

{% block title %}Production{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-start mb-4">
  <div>
    <h1 class="h2 fw-bold mb-1">Production</h1>
    <p class="text-muted mb-0">Production planning for {{ company.name }}</p>
  </div>
</div>

<div class="card border-0 shadow-sm">
  <div class="card-body text-center py-5">
    <i class="bi bi-clipboard2-check fs-1 text-muted d-block mb-3"></i>
    <h5 class="fw-semibold">Production Planning Coming Soon</h5>
    <p class="text-muted mb-0">This area will show your inventory, projected demand from distributor POs, and production scheduling.</p>
  </div>
</div>
{% endblock %}
