<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password | productERP</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      background: linear-gradient(145deg, #1a2d42 0%, #2c5f8a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .card { border: none; border-radius: 12px; max-width: 420px; width: 100%; }
  </style>
</head>
<body>
  <div class="text-center mb-4 text-white">
    <i class="bi bi-bar-chart-fill fs-2 text-warning"></i>
    <h4 class="fw-bold mt-1 mb-0">productERP</h4>
  </div>
  <div class="card mx-3">
    <div class="card-body p-4 p-sm-5 text-center">
      <i class="bi bi-shield-lock fs-1 text-primary mb-3 d-block"></i>
      <h5 class="fw-semibold mb-2">Forgot your password?</h5>
      <p class="text-muted mb-4">
        Self-service password reset is not yet available.<br>
        Please contact your administrator to reset your password.
      </p>
      <a href="{% url 'login' %}" class="btn btn-primary">
        <i class="bi bi-arrow-left me-1"></i>Back to Sign In
      </a>
    </div>
  </div>
</body>
</html>
