<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In | productERP</title>

  {% load static %}
  <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    :root {
      --erp-primary:    #2c5f8a;
      --erp-primary-dk: #1e4266;
      --erp-accent:     #e8a020;
    }

    body {
      background: linear-gradient(145deg, #1a2d42 0%, #2c5f8a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      border: none;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,.35);
    }

    .login-brand {
      color: #fff;
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .login-brand .brand-icon {
      font-size: 2.5rem;
      color: var(--erp-accent);
      display: block;
      margin-bottom: .4rem;
    }
    .login-brand h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -.5px;
      margin-bottom: .2rem;
    }
    .login-brand p {
      font-size: .85rem;
      color: rgba(255,255,255,.7);
      margin: 0;
    }

    .btn-login {
      background: var(--erp-accent);
      border: none;
      color: #fff;
      font-weight: 600;
      padding: .65rem;
      font-size: 1rem;
      border-radius: 6px;
      transition: background .2s;
    }
    .btn-login:hover {
      background: #cf8c16;
      color: #fff;
    }

    .form-control:focus {
      border-color: var(--erp-primary);
      box-shadow: 0 0 0 .2rem rgba(44,95,138,.2);
    }

    .footer-note {
      color: rgba(255,255,255,.5);
      font-size: .78rem;
      text-align: center;
      margin-top: 1.5rem;
    }
  </style>
</head>

<body>

  <!-- Brand header -->
  <div class="login-brand px-3">
    <i class="bi bi-bar-chart-fill brand-icon"></i>
    <h1>productERP</h1>
    <p>Beverage Industry Operations Platform</p>
  </div>

  <!-- Login card -->
  <div class="login-card card mx-3">
    <div class="card-body p-4 p-sm-5">

      <h2 class="h5 fw-semibold mb-4 text-center" style="color:#1a2d42;">Sign in to your account</h2>

      {% if error %}
      <div class="alert alert-danger d-flex align-items-center gap-2 py-2" role="alert">
        <i class="bi bi-exclamation-circle-fill flex-shrink-0"></i>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form method="post" novalidate>
        {% csrf_token %}

        <div class="mb-3">
          <label for="id_username" class="form-label fw-medium">Username</label>
          <div class="input-group">
            <span class="input-group-text text-muted"><i class="bi bi-person"></i></span>
            <input
              type="text"
              name="username"
              id="id_username"
              class="form-control form-control-lg"
              placeholder="Enter your username"
              autocomplete="username"
              autofocus
              required
            >
          </div>
        </div>

        <div class="mb-4">
          <label for="id_password" class="form-label fw-medium">Password</label>
          <div class="input-group">
            <span class="input-group-text text-muted"><i class="bi bi-lock"></i></span>
            <input
              type="password"
              name="password"
              id="id_password"
              class="form-control form-control-lg"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            >
          </div>
        </div>

        <div class="d-grid mb-3">
          <button type="submit" class="btn btn-login btn-lg">
            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
          </button>
        </div>

        <div class="text-center">
          <a href="{% url 'password_reset_stub' %}" class="text-muted small">
            <i class="bi bi-question-circle me-1"></i>Forgot your password?
          </a>
        </div>

      </form>
    </div>
  </div>

  <p class="footer-note mt-3">
    productERP &copy; {% now "Y" %} &mdash; Drink Up Life, Inc
  </p>

  <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
